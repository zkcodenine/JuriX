version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jurix_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jurix
      MYSQL_USER: jurix_user
      MYSQL_PASSWORD: jurix_secret_2024
      MYSQL_ROOT_PASSWORD: root_secret_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret_2024"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jurix_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jurix_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://jurix_user:jurix_secret_2024@mysql:3306/jurix
      REDIS_URL: redis://redis:6379
      JWT_SECRET: jurix_jwt_secret_super_seguro_2024
      PORT: 3001
    volumes:
      - ./storage:/app/storage
      - ./backend/src:/app/src
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jurix_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001/api
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
