version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jurix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jurix
      POSTGRES_USER: jurix_user
      POSTGRES_PASSWORD: jurix_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurix_user -d jurix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jurix_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jurix_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://jurix_user:jurix_secret_2024@postgres:5432/jurix
      REDIS_URL: redis://redis:6379
      JWT_SECRET: jurix_jwt_secret_super_seguro_2024
      PORT: 3001
    volumes:
      - ./storage:/app/storage
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jurix_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001/api
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
