<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JuriX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      overflow: hidden;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      object-fit: contain;
      filter: drop-shadow(0 4px 24px rgba(201,168,76,.25));
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #c9a84c;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 11px;
      color: #555;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* Spinner */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #222;
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 12px;
      color: #555;
      letter-spacing: 1px;
      min-height: 18px;
      transition: color 0.3s;
    }

  </style>
</head>
<body>
  <!-- Logo oficial JuriX -->
  <img class="logo" src="assets/icon.png" alt="JuriX" />

  <div class="title">JURIX</div>
  <div class="subtitle">Sistema Jurídico</div>

  <div class="spinner-wrap" id="spinnerWrap">
    <div class="spinner"></div>
    <div class="status" id="statusText">Iniciando...</div>
  </div>

  <script>
    const statusEl = document.getElementById('statusText')

    const messages = [
      'Iniciando...',
      'Conectando ao banco de dados...',
      'Carregando módulos...',
      'Quase pronto...',
    ]
    let msgIdx = 0

    setInterval(() => {
      msgIdx = (msgIdx + 1) % messages.length
      statusEl.textContent = messages[msgIdx]
    }, 1800)
  </script>
</body>
</html>
